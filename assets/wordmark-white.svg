<svg viewBox="0 0 520 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5B41E0"/>
      <stop offset="100%" stop-color="#9070FF"/>
    </linearGradient>
    <linearGradient id="shine" x1="60" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Icon mark (scaled to 120×120) -->
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="120" height="60" rx="28" fill="url(#shine)"/>

  <!-- Shackle -->
  <path
    d="M 43 69 L 43 52 A 17 17 0 0 1 77 52 L 77 69"
    stroke="white" stroke-width="9" stroke-linecap="round" fill="none" stroke-opacity="0.97"
  />
  <!-- Lock body -->
  <rect x="29" y="67" width="62" height="40" rx="9" fill="white" fill-opacity="0.96"/>
  <!-- Keyhole -->
  <circle cx="60" cy="84" r="7" fill="url(#bg)"/>
  <rect x="56.5" y="88" width="7" height="9" rx="2.5" fill="url(#bg)"/>

  <!-- "envlock" wordmark text -->
  <!-- Using a system sans-serif that renders well everywhere -->
  <text
    x="148"
    y="80"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="58"
    font-weight="700"
    letter-spacing="-2"
    fill="white"
  >envlock</text>
</svg>
